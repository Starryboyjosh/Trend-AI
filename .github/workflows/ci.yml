name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  web-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run prettier check
        run: npx prettier --check "starter/web/**/*.{ts,tsx,css,json}"

      - name: Run lint
        run: npm run web:lint

      - name: Run typecheck
        run: npm run web:typecheck

      - name: Run tests
        run: npm run web:test

  backend-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pytest-asyncio fastapi uvicorn pydantic sqlalchemy alembic psycopg[binary] redis httpx boto3 pillow

      - name: Run ruff check
        run: python -m ruff check starter/backend/

      - name: Run tests
        run: PYTHONPATH=starter/backend python -m pytest starter/backend/tests
