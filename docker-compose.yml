services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: hitrendy
      POSTGRES_USER: hitrendy
      POSTGRES_PASSWORD: hitrendy
    ports: ["5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]

  redis:
    image: redis:8-alpine
    ports: ["6379:6379"]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports: ["9000:9000", "9001:9001"]
    volumes: ["minio_data:/data"]

  api:
    build:
      context: .
      dockerfile: starter/backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=development
      - APP_NAME=HiTrendy
      - API_PREFIX=/api/v1
      - DATABASE_URL=postgresql+psycopg://hitrendy:hitrendy@postgres:5432/hitrendy
      - REDIS_URL=redis://redis:6379/0
      - OBJECT_STORAGE_ENDPOINT=http://minio:9000
      - OBJECT_STORAGE_ACCESS_KEY=minio
      - OBJECT_STORAGE_SECRET_KEY=minio123
      - OBJECT_STORAGE_BUCKET=hitrendy
      - AI_PROVIDER=demo
      - AI_MODEL=demo-v1
      - JWT_SECRET=replace-in-local-env
    volumes:
      - ./starter/backend:/app
    depends_on:
      - postgres
      - redis
      - minio

  web:
    build:
      context: .
      dockerfile: starter/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    volumes:
      - ./starter/web:/app
      - /app/node_modules
    depends_on:
      - api

volumes:
  postgres_data:
  minio_data:
